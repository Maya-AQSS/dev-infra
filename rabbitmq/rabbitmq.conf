## RabbitMQ configuration
## Topología declarativa cargada desde definitions.json al iniciar el sistema

## Carga de topology declarativa (exchanges, queues, bindings, policies)
load_definitions = /etc/rabbitmq/definitions.json

## Memory — adaptado al limit 512Mi del Deployment documentado
vm_memory_high_watermark.relative = 0.6

## Disk — liberar espacio en emptyDir antes de bloquear publishers
disk_free_limit.absolute = 1GB

## Management plugin — puerto 15672 (expuesto por compose / Traefik)
management.tcp.port = 15672

## Heartbeat AMQP — detectar conexiones zombie de workers
heartbeat = 60

## Log level
log.console = true
log.console.level = info

## Default user/pass vienen de RABBITMQ_DEFAULT_USER/PASS del compose